<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>UsageTimeWidget 示意图</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 40px;
        gap: 60px;
        color: #e2e8f0;
      }

      .scene-label {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 16px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      /* ====== 模拟笔记应用外壳 ====== */
      .app-frame {
        position: relative;
        width: 100%;
        max-width: 900px;
        height: 420px;
        border-radius: 12px;
        border: 1px solid #1e293b;
        background: #0f172a;
        overflow: hidden;
      }

      .app-sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 220px;
        background: #0f172a;
        border-right: 1px solid #1e293b;
        display: flex;
        flex-direction: column;
        z-index: 1;
      }

      .app-sidebar-header {
        height: 48px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        border-bottom: 1px solid #1e293b;
        font-size: 13px;
        font-weight: 600;
        color: #e2e8f0;
      }

      .app-sidebar-items {
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .app-sidebar-item {
        height: 36px;
        border-radius: 6px;
        background: transparent;
      }

      .app-sidebar-item.active {
        background: #1e293b;
      }

      .app-content {
        position: absolute;
        left: 220px;
        top: 0;
        right: 0;
        bottom: 0;
        background: #0f172a;
        z-index: 1;
        display: flex;
        flex-direction: column;
      }

      .app-toolbar {
        height: 44px;
        border-bottom: 1px solid #1e293b;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 8px;
      }

      .toolbar-btn {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: transparent;
        border: 1px solid #334155;
      }

      .app-editor {
        flex: 1;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .editor-line {
        height: 14px;
        border-radius: 2px;
        background: #1e293b;
      }

      .editor-line:nth-child(1) {
        width: 40%;
        background: #3b82f6;
        height: 18px;
      }
      .editor-line:nth-child(2) {
        width: 85%;
      }
      .editor-line:nth-child(3) {
        width: 72%;
      }
      .editor-line:nth-child(4) {
        width: 60%;
      }
      .editor-line:nth-child(5) {
        width: 0;
        height: 12px;
      }
      .editor-line:nth-child(6) {
        width: 90%;
      }
      .editor-line:nth-child(7) {
        width: 55%;
      }
      .editor-line:nth-child(8) {
        width: 78%;
      }

      .app-statusbar {
        height: 24px;
        border-top: 1px solid #1e293b;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        font-size: 10px;
        color: #64748b;
      }

      /* ====== Widget 默认态 ====== */
      .usage-time-widget {
        position: absolute;
        bottom: 36px;
        right: 16px;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }

      .usage-time-trigger {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px 6px 6px;
        border-radius: 9999px;
        border: 1px solid #334155;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(12px);
        cursor: pointer;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        transition: all 0.25s ease;
      }

      .usage-time-trigger:hover {
        border-color: rgba(59, 130, 246, 0.3);
        box-shadow: 0 2px 16px rgba(59, 130, 246, 0.1);
        transform: translateY(-1px);
      }

      .usage-time-label {
        font-size: 12px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
        color: rgba(226, 232, 240, 0.7);
      }

      /* ====== Tooltip 展开态 ====== */
      .usage-time-tooltip {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid #334155;
        background: rgba(30, 41, 59, 0.95);
        backdrop-filter: blur(12px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
        min-width: 160px;
      }

      .usage-time-tooltip-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 2px 0;
      }

      .usage-time-tooltip-title {
        font-size: 11px;
        color: #64748b;
      }

      .usage-time-tooltip-value {
        font-size: 11px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: #e2e8f0;
      }

      .usage-time-tooltip-bar {
        margin-top: 6px;
        height: 3px;
        border-radius: 2px;
        background: rgba(100, 116, 139, 0.15);
        overflow: hidden;
      }

      .usage-time-tooltip-bar-fill {
        height: 100%;
        border-radius: 2px;
        background: rgba(59, 130, 246, 0.7);
        transition: width 1s linear;
      }

      .usage-time-pause-btn {
        margin-top: 8px;
        width: 100%;
        padding: 5px 0;
        border-radius: 6px;
        border: 1px solid #334155;
        background: transparent;
        color: #64748b;
        font-size: 10px;
        cursor: pointer;
      }

      .usage-time-pulse-dot {
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }

      /* ====== 亮色场景 ====== */
      .app-frame.light {
        background: #ffffff;
      }

      .app-frame.light .app-sidebar {
        background: #f8fafc;
        border-color: #e2e8f0;
      }

      .app-frame.light .app-sidebar-header {
        border-color: #e2e8f0;
        color: #0f172a;
      }

      .app-frame.light .app-sidebar-item.active {
        background: #e2e8f0;
      }

      .app-frame.light .app-content {
        background: #ffffff;
      }

      .app-frame.light .app-toolbar {
        border-color: #e2e8f0;
      }

      .app-frame.light .toolbar-btn {
        border-color: #e2e8f0;
      }

      .app-frame.light .editor-line {
        background: #f1f5f9;
      }

      .app-frame.light .editor-line:nth-child(1) {
        background: #3b82f6;
      }

      .app-frame.light .app-statusbar {
        border-color: #e2e8f0;
        color: #94a3b8;
      }

      .app-frame.light .usage-time-trigger {
        border-color: #e2e8f0;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      }

      .app-frame.light .usage-time-trigger:hover {
        border-color: rgba(59, 130, 246, 0.3);
        box-shadow: 0 2px 16px rgba(59, 130, 246, 0.1);
      }

      .app-frame.light .usage-time-label {
        color: rgba(15, 23, 42, 0.6);
      }

      .app-frame.light .usage-time-tooltip {
        border-color: #e2e8f0;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }

      .app-frame.light .usage-time-tooltip-title {
        color: #94a3b8;
      }
      .app-frame.light .usage-time-tooltip-value {
        color: #0f172a;
      }
      .app-frame.light .usage-time-tooltip-bar {
        background: rgba(148, 163, 184, 0.15);
      }
      .app-frame.light .usage-time-tooltip-bar-fill {
        background: rgba(59, 130, 246, 0.7);
      }
      .app-frame.light .usage-time-pause-btn {
        border-color: #e2e8f0;
        color: #94a3b8;
      }
      .app-frame.light .usage-time-ring-bg {
        stroke: rgba(148, 163, 184, 0.12);
      }
      .app-frame.light .usage-time-ring-progress {
        stroke: rgba(59, 130, 246, 0.6);
      }
      .app-frame.light .pulse-dot {
        fill: #3b82f6;
      }
    </style>
  </head>
